<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | Dispatch Box</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>

  <!-- Header -->
  <header class="admin-header">
    <div class="header-inner">
      <div class="logo-area">
        <div>
          <h1 class="app-title">Dispatch Box</h1>
          <p class="app-subtitle">Settings &amp; Script Manager</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="btn-export" class="action-btn" title="Export all data as JSON">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export JSON
        </button>
        <button id="btn-import-trigger" class="action-btn" title="Import data from JSON">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Import JSON
        </button>
        <input type="file" id="file-import" accept=".json" style="display:none;">
      </div>
    </div>


  </header>

  <!-- Toast -->
  <div id="toast-container"></div>

  <div class="main-panel">

    <!-- Toolbar -->
    <div class="scripts-toolbar">
      <div class="filter-row">
        <select id="filter-category" class="filter-select">
          <option value="driver">Driver</option>
          <option value="customer">Customer</option>
          <option value="general">General</option>
        </select>

      </div>
      <button id="btn-new-script" class="btn-primary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Script
      </button>
    </div>

    <!-- Script Cards Grid -->
    <div id="scripts-grid" class="scripts-grid">
      <!-- Rendered dynamically -->
    </div>

    <div id="no-scripts-msg" class="empty-panel" style="display:none;">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>No scripts yet. Click <strong>New Script</strong> to add one.</p>
    </div>

    <!-- Script Edit / Add Drawer (slide-in panel) -->
    <div id="script-drawer" class="script-drawer">
      <div class="drawer-backdrop" id="drawer-backdrop"></div>
      <div class="drawer-panel">
        <div class="drawer-header">
          <h2 id="drawer-title">New Script</h2>
          <button id="btn-close-drawer" class="btn-icon-close" title="Close">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <form id="script-form" class="drawer-form">
          <input type="hidden" id="script-id">

          <!-- Meta Row -->
          <div class="drawer-meta-row" style="grid-template-columns: 2fr 1fr;">
            <div class="form-group">
              <label for="script-title">Title <span class="req">*</span></label>
              <input type="text" id="script-title" placeholder="e.g. Driver Late Arrival" required autocomplete="off">
            </div>
            <div class="form-group">
              <label for="script-category">Category <span class="req">*</span></label>
              <select id="script-category" required>
                <option value="driver">Driver</option>
                <option value="customer">Customer</option>
                <option value="general">General</option>
              </select>
            </div>

          </div>

          <!-- Language Tabs inside drawer -->
          <div class="lang-tabs">
            <button type="button" class="lang-tab active" data-lang="ar">🇸🇦 Arabic</button>
            <button type="button" class="lang-tab" data-lang="en">🇬🇧 English</button>
            <button type="button" class="lang-tab" data-lang="ckb">🏔 Kurdish</button>
          </div>

          <div class="lang-panel active" id="panel-ar">
            <label for="text-ar">Arabic text (RTL) <span class="req">*</span></label>
            <textarea id="text-ar" dir="rtl" rows="6" placeholder="اكتب النص العربي هنا..." required></textarea>
          </div>
          <div class="lang-panel" id="panel-en">
            <label for="text-en">English text (LTR) <span class="req">*</span></label>
            <textarea id="text-en" dir="ltr" rows="6" placeholder="Type the English text here..." required></textarea>
          </div>
          <div class="lang-panel" id="panel-ckb">
            <label for="text-ckb">Kurdish Sorani text (RTL) <span class="req">*</span></label>
            <textarea id="text-ckb" dir="rtl" rows="6" placeholder="ده‌قی کوردی لێره‌ بنووسه‌..." required></textarea>
            <span class="hint">Use Kurdish keyboard chars: ڕ ڵ ە ێ ۆ ڱ ﮫ</span>
          </div>

          <div class="drawer-actions">
            <button type="submit" id="btn-save-script" class="btn-primary btn-full">Save Script</button>
            <button type="button" id="btn-delete-script" class="btn-danger btn-full" style="display:none;">Delete Script</button>
          </div>
        </form>
      </div>
    </div>
  </div>



  <script src="data.js"></script>
  <script src="options.js" defer></script>
</body>
</html>
